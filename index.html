<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chess Analyzer</title>

  <!-- Štýly pre šachovnicu -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.css">

  <!-- Skripty pre šachovnicu a logiku šachu -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>
<body>

<h1>Chess Analyzer</h1>

<div id="board" style="width: 400px; margin-bottom: 20px;"></div>
<button id="analyzeBtn">Analyzovať</button>

<pre id="output"></pre>

<script>
  const game = new Chess();
  const board = Chessboard('board', {
    draggable: true,
    position: 'start',
    onDrop: (source, target) => {
      const move = game.move({ from: source, to: target, promotion: 'q' });
      if (!move) return 'snapback';
    }
  });

  document.getElementById('analyzeBtn').onclick = () => {
    document.getElementById('output').textContent = "Analýza zatiaľ nie je pripojená.";
  };
</script>

</body>
</html>
